name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Generate config.js from GitHub Secrets at build time.
      # This  file is in .gitignore so it never exists in the repo —
      # the workflow creates it fresh on every deploy.
      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'EOF'
          window.__FTC_CONFIG__ = {
            firebase: {
              apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
              authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              databaseURL:       "${{ secrets.FIREBASE_DATABASE_URL }}",
              projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId:             "${{ secrets.FIREBASE_APP_ID }}",
            },
            adminUid: "${{ secrets.ADMIN_UID }}",
          };
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '' 
          enable_jekyll: false
          force_orphan: true
